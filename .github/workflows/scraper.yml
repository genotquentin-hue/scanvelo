name: Bike Monitor

# Les heures cron sont en UTC. Bruxelles = UTC+1 (hiver) / UTC+2 (été).
on:
  schedule:
    # Scraping toutes les heures en backup (cron-job.org est le déclencheur principal)
    - cron: "0 7-20 * * *"
  workflow_dispatch:        # permet de lancer manuellement depuis l'onglet Actions

# Évite que deux exécutions tournent en même temps (sinon conflits de git push).
concurrency:
  group: bike-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # nécessaire pour committer seen_ids.json / recent.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Scraping + alertes Telegram
        run: python main.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Committer les annonces vues (si changement)
        run: |
          git config user.name "bike-monitor[bot]"
          git config user.email "bike-monitor@users.noreply.github.com"
          git add data/seen_ids.json data/recent.json data/top5.json
          # git commit échoue s'il n'y a rien à committer → on l'ignore proprement
          if git diff --cached --quiet; then
            echo "Rien à committer."
            exit 0
          fi
          git commit -m "chore: mise à jour des annonces vues"
          # Le distant peut avoir avancé depuis le checkout : on rebase puis on pousse,
          # avec quelques tentatives en cas de course (push non-fast-forward).
          # -X theirs : les data/*.json sont de l'état régénéré à chaque run dont le
          # runner est propriétaire ; en cas de conflit on garde la version du runner.
          # git rebase --abort : si le rebase s'interrompt malgré tout, on nettoie
          # l'arbre avant de retenter, sinon le pull suivant boucle sur "unmerged files".
          for i in 1 2 3 4 5; do
            if git pull --rebase -X theirs --autostash origin main && git push; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "Push refusé (tentative $i), nouvelle tentative…"
            sleep 5
          done
          echo "Échec du push après 5 tentatives." >&2
          exit 1
